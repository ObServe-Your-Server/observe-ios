name: iOS CI

on:
  pull_request:
    branches: [ "main" ]
    types: [ opened, synchronize, reopened, closed ]

jobs:
  test:
    name: Test
    runs-on: macos-15
    if: github.event.pull_request.merged == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Generate Xcode project
        run: brew install xcodegen && xcodegen generate

      - name: Run Tests
        run: bundle exec fastlane tests

  beta:
    name: TestFlight
    runs-on: macos-15
    environment: fastlane
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Generate Xcode project
        run: brew install xcodegen && xcodegen generate

      - name: Install API key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          printf '%s' "$ASC_PRIVATE_KEY" | base64 --decode > /tmp/AuthKey.p8
          echo "File size: $(wc -c < /tmp/AuthKey.p8) bytes"
          head -1 /tmp/AuthKey.p8

      - name: Verify API key
        run: openssl ec -in /tmp/AuthKey.p8 -noout 2>&1 && echo "Key OK" || echo "Key INVALID"

      - name: Patch fastlane OpenSSL compatibility
        run: |
          TOKEN_FILE=$(find vendor/bundle -path "*/spaceship/connect_api/token.rb" | head -1)
          sed -i '' 's/OpenSSL::PKey::EC\.new(key)/OpenSSL::PKey.read(key)/' "$TOKEN_FILE"

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PEM_PATH: /tmp/AuthKey.p8
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane beta
